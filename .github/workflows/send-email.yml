name: Send Email Script

# Déclenche le workflow à chaque push sur la branche 'main'
on:
  push:
    branches:
      - main

# Définir le job principal appelé 'build'
jobs:
  build:
    runs-on: ubuntu-latest  # Système d'exploitation sur lequel exécuter le job

    steps:
    - name: Checkout code  # Étape pour récupérer ton code
      uses: actions/checkout@v2

    - name: Setup Node.js  # Installer Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'

    - name: Install dependencies  # Installer les dépendances (si tu as un package.json)
      run: npm install

    - name: Run email script  # Exécuter ton script
      env:  # Définir les variables d'environnement, ici ton secret
        EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}
      run: node email.js
