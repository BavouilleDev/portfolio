name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main  # Ou la branche où est ton site

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Move files
        run: |
          mv src/* .
          rm -rf src

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .  # Publie tout à la racine de `gh-pages`
